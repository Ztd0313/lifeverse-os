name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: 代码质量检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装依赖
        run: npm ci --legacy-peer-deps

      - name: TypeScript 类型检查
        run: npx tsc --noEmit

      - name: ESLint 代码规范检查
        run: npm run lint

      - name: Jest 单元测试
        run: npm test

      - name: 构建生产版本
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
